<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="SPY 波动电话告警系统 — 当 SPY 涨跌幅达到阈值自动打电话叫醒你" />
  <meta name="theme-color" content="#050914" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <title>波动叫叫叫 — SPY 电话告警</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #081120;
      --panel: rgba(12, 23, 40, 0.82);
      --line: rgba(148, 163, 184, 0.14);
      --text: #f5f7fb;
      --muted: #9db0c8;
      --accent: #49c3ff;
      --accent2: #7c5cff;
      --green: #2bd576;
      --red: #ff6b6b;
      --orange: #ffa94d;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(73,195,255,0.15), transparent 50%),
        radial-gradient(ellipse at 80% 0%, rgba(124,92,255,0.12), transparent 45%),
        linear-gradient(180deg, #050b16, var(--bg) 50%, #09131f);
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .shell {
      width: min(520px, calc(100% - 24px));
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 0
               calc(env(safe-area-inset-bottom, 0px) + 32px);
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 17px; }
    .brand-dot {
      width: 28px; height: 28px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--line); background: rgba(255,255,255,0.03);
    }
    .status-pill .dot {
      width: 7px; height: 7px; border-radius: 99px;
      background: var(--muted);
    }
    .status-pill.live .dot { background: var(--green); box-shadow: 0 0 0 4px rgba(43,213,118,0.15); }
    .status-pill.alert .dot { background: var(--red); box-shadow: 0 0 0 4px rgba(255,107,107,0.2); }

    /* ── Hero Card ── */
    .hero-card {
      margin-top: 16px; padding: 24px 20px;
      border-radius: var(--radius); border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14,25,42,0.95), rgba(8,17,32,0.85));
      box-shadow: 0 32px 64px rgba(2,8,20,0.5);
    }
    .hero-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .hero-percent {
      font-size: clamp(48px, 12vw, 72px); font-weight: 900;
      letter-spacing: -0.04em; line-height: 1;
    }
    .hero-percent.up { color: var(--green); }
    .hero-percent.down { color: var(--red); }
    .hero-percent.neutral { color: var(--muted); }
    .hero-sub {
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px;
      font-size: 13px; color: var(--muted);
    }
    .hero-sub span { white-space: nowrap; }

    .threshold-bar {
      margin-top: 18px; padding: 14px 16px;
      border-radius: 14px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }
    .threshold-bar .tb-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--muted);
    }
    .threshold-bar .tb-value { font-weight: 800; color: var(--text); }
    .threshold-bar .progress-track {
      margin-top: 8px; height: 6px; border-radius: 99px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .threshold-bar .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
    }
    .threshold-bar .progress-fill.breach {
      background: linear-gradient(90deg, var(--red), var(--orange));
    }

    /* ── Metric Grid ── */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .metric {
      padding: 14px 16px; border-radius: 16px;
      border: 1px solid var(--line); background: var(--panel);
    }
    .metric .label { font-size: 12px; color: var(--muted); }
    .metric .value { font-size: 18px; font-weight: 800; margin-top: 4px; }

    /* ── Section Card ── */
    .card {
      margin-top: 14px; padding: 20px;
      border-radius: var(--radius); border: 1px solid var(--line);
      background: var(--panel);
    }
    .card h2 {
      font-size: 16px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h2 .icon { font-size: 20px; }

    /* ── Form ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%; padding: 12px 14px;
      border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.04); color: var(--text);
      font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field .hint { font-size: 12px; color: rgba(157,176,200,0.7); margin-top: 4px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Buttons ── */
    .btn {
      display: flex; justify-content: center; align-items: center;
      width: 100%; min-height: 52px; padding: 0 20px;
      border-radius: 16px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #04111f;
      box-shadow: 0 12px 28px rgba(73,195,255,0.25);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--red), #ff4757);
      color: #fff;
      box-shadow: 0 12px 28px rgba(255,107,107,0.2);
    }
    .btn-outline {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line); color: var(--muted);
    }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }

    /* ── Alert Log ── */
    .log-empty { text-align: center; padding: 24px 0; color: var(--muted); font-size: 13px; }
    .log-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-item .log-time { color: var(--muted); }
    .log-item .log-tag {
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .log-tag.triggered { background: rgba(255,107,107,0.15); color: var(--red); }
    .log-tag.called { background: rgba(43,213,118,0.12); color: var(--green); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 14px;
      background: rgba(15,25,42,0.96); border: 1px solid var(--line);
      color: var(--text); font-size: 14px; font-weight: 600;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,107,107,0.4); }

    /* ── TradingView ── */
    .tv-frame {
      margin-top: 14px; border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--line); background: rgba(8,17,31,0.6);
    }
    .tv-frame iframe { width: 100%; height: 220px; border: 0; display: block; }

    /* ── Footer ── */
    .footer {
      margin-top: 24px; text-align: center;
      font-size: 12px; color: rgba(157,176,200,0.5);
      line-height: 1.6;
    }

  </style>
</head>
<body>
  <div class="shell" id="mainContent">
    <div class="header">
      <div class="brand">
        <div class="brand-dot"></div>
        <span>波动叫叫叫</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <a href="./nasdaq50.html" style="font-size:12px;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,0.03);color:var(--muted);font-weight:600">纳斯达克 50 →</a>
        <div class="status-pill" id="statusPill">
          <span class="dot"></span>
          <span id="statusText">未启动</span>
        </div>
      </div>
    </div>

    <!-- Hero: SPY Quote -->
    <div class="hero-card">
      <div class="hero-label">SPY 涨跌幅 <span id="marketPhase"></span></div>
      <div class="hero-percent neutral" id="changeDisplay">—</div>
      <div class="hero-sub">
        <span id="priceDisplay">最新价 —</span>
        <span>|</span>
        <span id="prevCloseDisplay">昨收 —</span>
        <span>|</span>
        <span id="timeDisplay">—</span>
      </div>
      <div class="threshold-bar">
        <div class="tb-row">
          <span>距离告警阈值</span>
          <span class="tb-value" id="gapDisplay">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="label">告警阈值</div>
        <div class="value" id="thresholdDisplay">±3.00%</div>
      </div>
      <div class="metric">
        <div class="label">监控状态</div>
        <div class="value" id="monitorDisplay">未启动</div>
      </div>
      <div class="metric">
        <div class="label">纽约时间</div>
        <div class="value" id="nyTimeDisplay">—</div>
      </div>
      <div class="metric">
        <div class="label">北京时间</div>
        <div class="value" id="cnTimeDisplay">—</div>
      </div>
    </div>

    <!-- Config -->
    <div class="card" id="configCard">
      <h2><span class="icon">⚙️</span> 告警配置</h2>
      <div class="field">
        <label for="phoneInput">电话号码（含国际区号）</label>
        <input id="phoneInput" type="tel" placeholder="+8613800138000" autocomplete="tel" />
        <div class="hint">SPY 涨跌幅触达阈值时，系统会拨打此号码叫醒你</div>
      </div>
      <div class="field">
        <label for="thresholdInput">告警阈值 (%)</label>
        <input id="thresholdInput" type="number" value="3" min="0.5" max="20" step="0.5" />
      </div>
      <div id="trustHint" style="margin-bottom:10px;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,169,77,0.3);background:rgba(255,169,77,0.06);font-size:13px;color:var(--orange);line-height:1.6;display:none">
        首次使用需信任 API 证书：<a href="https://154.17.29.16:3457/api/call" target="_blank" style="color:var(--accent);text-decoration:underline">点此打开</a>，在浏览器中选择"继续前往"，然后回来点测试电话。
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="startBtn" type="button">启动监控</button>
        <button class="btn btn-outline" id="testCallBtn" type="button">测试电话</button>
      </div>
      <button class="btn btn-danger" id="stopBtn" type="button" style="margin-top:10px;display:none">停止监控</button>
    </div>

    <!-- Alert Log -->
    <div class="card">
      <h2><span class="icon">📋</span> 告警记录</h2>
      <div id="logContainer">
        <div class="log-empty">暂无告警记录</div>
      </div>
    </div>

    <!-- TradingView -->
    <div class="tv-frame">
      <iframe
        title="TradingView SPY"
        loading="lazy"
        src="https://www.tradingview-widget.com/embed-widget/mini-symbol-overview/?locale=zh_CN&symbol=AMEX%3ASPY&dateRange=1D&colorTheme=dark&isTransparent=true&width=100%25&height=220"
      ></iframe>
    </div>

    <div class="footer">
      波动叫叫叫 · SPY 电话告警系统<br />
      行情来源 Yahoo Finance · 每次部署 & 定时刷新
    </div>
  </div><!-- .main-content -->

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
